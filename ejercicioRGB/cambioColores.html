<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cambioColores.css">
    <title>Color RGB</title>
  </head>

  <body>
    <div class="contenedor-principal">
      <div class="contenedor-interno">
        <div class="color">
          <label for="rojo">Rojo (R)</label>
          <input id="rojo" type="range" min="0" max="255" value="23" step="1">
          <p id="rojo"></p>
          <p id="color-rojo">23</p>
          
        </div>

        <div class="color">
          <label for="verde">Verde (G)</label>
          <input id="verde" type="range" min="0" max="255" value="41" step="1">
          <p id="verde"></p>
          <p id="color-verde">41</p>
        </div>

        <div class="color">
          <label for="azul">Azul (B)</label>
          <input id="azul" type="range" min="0" max="255" value="56" step="1">
          <p id="azul"></p>
          <p id="color-azul">56</p>
        </div>
      </div>
      <p id="color"></p>
    </div>
    <script src="RGB.js"></script>
  </body>
</html>
